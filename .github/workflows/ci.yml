name: Flutter CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
